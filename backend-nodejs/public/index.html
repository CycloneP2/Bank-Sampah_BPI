<!DOCTYPE html>
<html lang="id">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPPP Bank Sampah API</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

        }

            margin-top: 15px;

<body>
    <div class="container">
        <h1>KPPP Bank Sampah API</h1>
